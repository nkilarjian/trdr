# Render Blueprint — the TRDR data engine (Fastify API + fair-value model).
# New + → "Blueprint" → pick the nkilarjian/trdr repo → it creates trdr-api.
# The web app itself ships from GitHub Pages; this just gives it real data.
# Runs on mocks until you add the EBAY_* keys below, then it's live eBay data.
# After it deploys, copy the service URL (e.g. https://trdr-api.onrender.com) and
# set EXPO_PUBLIC_API_BASE on the Pages build to point the app at it.
services:
  # ── API (model + providers) ────────────────────────────────────
  - type: web
    name: trdr-api
    runtime: node
    plan: free
    rootDir: .
    # --prod=false so tsx/typescript (the API runs via tsx) are installed even
    # though Render sets NODE_ENV=production.
    buildCommand: corepack enable && pnpm install --prod=false
    startCommand: pnpm --filter @trdr/api start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      # eBay (real listings) — add when your dev account is approved
      - key: EBAY_CLIENT_ID
        sync: false
      - key: EBAY_CLIENT_SECRET
        sync: false
      - key: EBAY_MARKETPLACE_ID
        value: EBAY_US
      - key: EBAY_EPN_CAMPAIGN_ID
        sync: false
      # Vision photo-scan (Claude)
      - key: VISION_BACKEND
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      # Where accumulated sold-comps persist on the instance disk
      - key: SOLD_STORE_PATH
        value: /tmp/trdr/sold-comps.json
      - key: WATCHLIST_PATH
        value: /tmp/trdr/watchlist.json
