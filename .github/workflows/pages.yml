# Deploy the web app to GitHub Pages via the official Actions pipeline (build →
# upload artifact → deploy). The base path /trdr (project Pages live under
# /<repo>/) is injected at build time so the committed app.json stays root-relative.
name: Deploy web to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "apps/mobile/**"
      - "packages/**"
      - "services/ingestion/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight one finish so a deployment isn't orphaned.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build web (custom domain root)
        working-directory: apps/mobile
        env:
          # Clerk publishable key is public (ships in every client) — safe to commit.
          EXPO_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_aW1tdW5lLWRpbm9zYXVyLTQ4LmNsZXJrLmFjY291bnRzLmRldiQ
          # Live data engine (TRDR API on Railway). Serves model estimates until
          # the EBAY_* vars are set on Railway, then real eBay-backed values.
          EXPO_PUBLIC_API_BASE: https://trdr-api-production.up.railway.app
        run: |
          npm ci
          node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('app.json','utf8'));j.expo.experiments={...(j.expo.experiments||{}),baseUrl:'/'};fs.writeFileSync('app.json',JSON.stringify(j,null,2));"
          npx expo export -p web
          node -e "const fs=require('fs');let h=fs.readFileSync('dist/index.html','utf8');if(!h.includes('no-store')){h=h.replace('<head>','<head><meta http-equiv=\"Cache-Control\" content=\"no-cache, no-store, must-revalidate\"><meta http-equiv=\"Pragma\" content=\"no-cache\"><meta http-equiv=\"Expires\" content=\"0\">');fs.writeFileSync('dist/index.html',h);}"
          touch dist/.nojekyll
          # Custom domain — keeps Pages serving at trdr.kilarjian.com on every deploy.
          echo "trdr.kilarjian.com" > dist/CNAME

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/mobile/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
